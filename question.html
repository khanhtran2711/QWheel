<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bootstrap Paragraph Card</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <div class="min-vh-100 d-flex align-items-center justify-content-center p-4">
    <div class="card shadow-sm border-2 rounded-4" style="max-width: 760px; width: 100%;">
      <div class="card-body p-4 p-md-5">
        <a href="./index.html">Back</a>
        <h2 class="fw-bold mb-3"><span id="question-number">Question <span id="num"></span>
        </span></h2>

        <p class="fs-5 text-secondary mb-0" id="questionContent">
          
        </p>
      </div>
    </div>
  </div>
  <p id="name"></p>



  <!-- Bootstrap 5 JS (optional, only needed for components like modals/dropdowns) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
<script>
    const params = new URLSearchParams(window.location.search);
    let key = params.get("id");
    document.getElementById("num").textContent = key;
let chosen = null;

// 1) load the JSON file (must be served via a local server, not file://)
  fetch("data.json")
    .then(res => res.json())
    .then(data => {
        // console.log(data.questions);
        key = params.get("id");
        for (let index = 0; index < 30; index++) {
            const element = data.questions[index];
            if(element.id==key)
                document.getElementById("questionContent").innerHTML = element.question;
        }
    })
    .catch(err => console.error(err));

</html>
